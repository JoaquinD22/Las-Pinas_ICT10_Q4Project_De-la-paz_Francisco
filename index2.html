<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grade 10 Classmates System</title>

  <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css"/>
  <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #020704;
      --green-d:    #15803d;
      --green-l:    #dcfce7;
      --green-xl:   #f0fdf4;
      --blue:       #2563eb;
      --blue-d:     #1d4ed8;
      --navy:       #0f172a;
      --slate:      #475569;
      --muted:      #94a3b8;
      --border:     #bbf7d0;
      --white:      #ffffff;
      --radius:     14px;
      --shadow-sm:  0 1px 4px rgba(0,0,0,.07);
      --shadow:     0 4px 24px rgba(22,163,74,.14);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--green-xl);
      color: var(--navy);
      min-height: 100vh;
    }

    header {
      background: var(--white);
      border-bottom: 2px solid var(--border);
      box-shadow: 0 2px 16px rgba(22,163,74,.10);
      text-align: center;
      padding: 28px 20px 20px;
    }
    header h1 {
      font-family: 'Nunito', sans-serif;
      font-size: 1.85rem;
      font-weight: 900;
      color: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      letter-spacing: -.5px;
    }
    header h1 .icon {
      width: 36px; height: 36px;
      background: var(--blue);
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 1.1rem;
    }
    header p {
      font-size: .88rem;
      color: var(--muted);
      margin-top: 5px;
      font-weight: 500;
    }
    nav {
      background: var(--white);
      border-bottom: 1.5px solid var(--border);
      display: flex;
      justify-content: center;
      gap: 0;
    }
    .nav-tab {
      padding: 14px 28px;
      font-family: 'Nunito', sans-serif;
      font-size: .92rem;
      font-weight: 700;
      color: var(--slate);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: color .2s, border-color .2s, background .2s;
      user-select: none;
    }
    .nav-tab:hover { color: var(--green); background: var(--green-xl); }
    .nav-tab.active {
      color: var(--green-d);
      border-bottom-color: var(--green);
    }


    .page { display: none; }
    .page.active { display: block; }

  
    .container {
      max-width: 820px;
      margin: 36px auto;
      padding: 0 20px 60px;
    }


    .card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px 36px;
      animation: fadeUp .35s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header { margin-bottom: 24px; }
    .card-title {
      font-family: 'Nunito', sans-serif;
      font-size: 1.25rem;
      font-weight: 900;
      color: var(--navy);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-sub {
      font-size: .82rem;
      color: var(--muted);
      margin-top: 4px;
    }
    .field {
      margin-bottom: 12px;
    }
    .field label {
      display: block;
      font-size: .78rem;
      font-weight: 600;
      color: var(--slate);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    input[type="text"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #cbd5e1;
      border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: .88rem;
      color: var(--navy);
      background: #f8fafc;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    input[type="text"]:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(22,163,74,.14);
      background: var(--white);
    }
    input[type="text"]::placeholder { color: #b0bec5; }
    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }
    .btn {
      flex: 1;
      padding: 12px 18px;
      border: none;
      border-radius: 9px;
      font-family: 'Nunito', sans-serif;
      font-size: .9rem;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: .2px;
      transition: filter .15s, transform .1s, box-shadow .15s;
    }
    .btn:active { transform: scale(.97); }
    .btn-blue {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 3px 12px rgba(37,99,235,.30);
    }
    .btn-blue:hover { filter: brightness(1.10); }
    .btn-green {
      background: var(--green);
      color: #fff;
      box-shadow: 0 3px 12px rgba(22,163,74,.30);
    }
    .btn-green:hover { filter: brightness(1.10); }

    .form-msg {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: .84rem;
      font-weight: 600;
      display: none;
    }
    .form-msg.error   { display: block; background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .form-msg.success { display: block; background: var(--green-l); color: var(--green-d); border: 1px solid var(--border); }

    .divider {
      border: none;
      border-top: 1.5px dashed var(--border);
      margin: 28px 0;
    }

    #list-section { display: none; }

    .list-header {
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 900;
      color: var(--navy);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .list-header .list-icon { font-size: 1.1rem; }


    #classmate-output { display: flex; flex-direction: column; gap: 10px; }

    .cl-card {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: var(--green-xl);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      animation: fadeUp .3s ease both;
    }
    .cl-num {
      min-width: 28px;
      height: 28px;
      background: var(--green);
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: .78rem;
      flex-shrink: 0;
    }
    .cl-text {
      font-size: .88rem;
      line-height: 1.6;
      color: #1e293b;
    }
    .cl-text strong { color: var(--green-d); }

    .empty {
      text-align: center;
      color: var(--muted);
      font-size: .88rem;
      padding: 20px;
    }

    .placeholder {
      text-align: center;
      padding: 70px 20px;
      color: var(--muted);
    }
    .placeholder .big-icon { font-size: 3.5rem; margin-bottom: 12px; }
    .placeholder h3 {
      font-family: 'Nunito', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      color: #94a3b8;
      margin-bottom: 6px;
    }
    .placeholder p { font-size: .85rem; }
    #py-loading {
      position: fixed; inset: 0;
      background: var(--green-xl);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      gap: 14px;
      transition: opacity .4s;
    }
    #py-loading .spinner {
      width: 42px; height: 42px;
      border: 4px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #py-loading p {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      color: var(--slate);
      font-size: .95rem;
    }
  </style>
</head>
<body>

<div id="py-loading">
  <div class="spinner"></div>
  <p>Loading PyScript…</p>
</div>

<header>
  <h1>
    <span class="icon">📋</span>
    Grade 10 Classmates System
  </h1>
  <p>Add and view your classmates easily</p>
</header>

<nav>
  <div class="nav-tab active" onclick="switchTab('classmates', this)">Classmates</div>
  <div class="nav-tab"       onclick="switchTab('attendance', this)">Attendance Tracker</div>
  <div class="nav-tab"       onclick="switchTab('gallery',    this)">Gallery</div>
</nav>

<div id="page-classmates" class="page active">
  <div class="container">
    <div class="card">

      <div class="card-header">
        <div class="card-title">👥 Add a Classmate</div>
        <div class="card-sub">Fill in the details below, then click <em>Add Classmate</em>.</div>
      </div>
      <div class="field">
        <label>Name</label>
        <input type="text" id="inp-name" placeholder="e.g. Maria Santos"/>
      </div>
      <div class="field">
        <label>Section</label>
        <input type="text" id="inp-section" placeholder="e.g. Emerald"/>
      </div>
      <div class="field">
        <label>Favorite Subject</label>
        <input type="text" id="inp-subject" placeholder="e.g. Mathematics"/>
      </div>

      <div class="btn-row">
        <button class="btn btn-blue"  id="btn-add">➕ Add Classmate</button>
        <button class="btn btn-green" id="btn-show">📋 Show List</button>
      </div>

      <div class="form-msg" id="form-msg"></div>

      <div id="list-section">
        <hr class="divider"/>
        <div class="list-header">
          <span class="list-icon">📝</span> Classmate List
        </div>
        <div id="classmate-output"></div>
      </div>

    </div>
  </div>
</div>
</body>
</html>
