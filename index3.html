<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendance Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.3.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.3.1/core.js"></script>

    <py-config>
packages = ["numpy", "matplotlib"]
    </py-config>

    <script type="py" src="main.py"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgba(163, 214, 85);
            font-weight: bolder;
        }

        nav {
            background-color: rgba(18, 58, 16, 0.8);
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.18);
        }

        .navbar-brand, .nav-link {
            color: #e9f7e9 !important;
        }

        .nav-link.active {
            color: #c8f7c5 !important;
            font-weight: 600;
        }

          #mainb {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 112px);
            padding: 40px 16px;
        }

        .main-container {
            display: grid;
            grid-template-columns: minmax(320px, 420px) minmax(320px, 560px);
            gap: 32px;
            justify-content: center;
            width: min(1120px, 100%);
        }

        .card {
            padding: 25px;
            border-radius: 10px;
            width: 100%;
            min-height: 500px;
            box-shadow: 0 10px 24px rgba(45, 95, 53, 0.12);
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(72, 124, 76, 0.16);
        }

        .card h2 {
            text-align: center;
            color: #10431f;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 5px;
            font-weight: 700;
            color: #1b4a23;
        }

        select, input {
            width: 100%;
            border-radius: 14px;
            border: 1px solid rgba(19, 72, 34, 0.28);
            color: #11331d;
        }

        button {
            width: 100%;
             padding: 10px;
            margin-top: 15px;
             background-color: #1b5827;
            color: white;
            border: none;
            border-radius: 14px;
        }

        #signed {
            margin-top: 19px;
            text-align: center;
            font-weight: bold;
            color: #1a4c27;
        }

        .graph {
            border-radius: 26px;
            width: 100%;
            min-height: 520px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 14px;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(19, 72, 34, 0.18);
            box-shadow: 0 18px 40px rgba(0,0,0,0.16);
            padding: 30px;
            color: #1c7736;
        }

        .graph h3 {
            margin: 0;
            font-size: 1.8rem;
            color: #153b28;
        }

        .graph p {
            max-width: 420px;
            color: #2f563d;
            line-height: 1.6;
            text-align: center;
        }
        
            .card, .graph {
                min-height: auto;
            }
    </style>
</head>

   <body>
     <nav class="navbar navbar-expand-lg navbar-dark" style="font-weight: bold;">
        <div class="container">
            <a class="navbar-brand" href="index2.html">10-Emerald Company</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index2.html">Classmates</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="index3.html">Attendance Tracker</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="index4.html">Class memories</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div id="mainb">
        <div class="main-container">
            <div class="card">
                <h2>Attendance Tracker</h2>

                <label>Choose Day:</label>
                <select id="day">
                    <option>Monday</option>
                    <option>Tuesday</option>
                    <option>Wednesday</option>
                    <option>Thursday</option>
                    <option>Friday</option>
                </select>

                <label>Absences:</label>
                <input type="number" id="absence" placeholder="Enter number">

                <button py-click="displaying">Submit</button>

                <div id="signed"></div>
            </div>

            <div id="graph" class="graph"></div>
        </div>
    </div>

    <footer>
        <p id="footertext" style="text-align: center;">Joaquin Delapaz, Amber Francisco Company. All Rights Reserved.</p>
    </footer>

     <script type="py" src="main.py"></script>
</body>
</html>
